name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agentleak/

      - name: Type check (mypy)
        run: mypy agentleak/

      - name: Test (pytest + coverage)
        run: pytest --cov=agentleak --cov-report=term-missing --cov-fail-under=70

      - name: Smoke test the CLI
        run: |
          agentleak version
          agentleak run --scenario healthcare_patient_summary --output /tmp/reports --format json || true
          test -f /tmp/reports/run_healthcare_001.json
